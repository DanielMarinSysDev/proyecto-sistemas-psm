<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskCore</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/Logo Azul.svg">
    <!-- Prevent theme flash -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        blue: {
                            400: '#3da2f5',
                            500: '#0278D2', /* Brand color `#0278D2` */
                            600: '#025fa6',
                            700: '#014980',
                        },
                        violet: {
                            400: '#3da2f5', 
                            500: '#0278D2',
                            600: '#025fa6',
                        },
                        slate: {
                            50: 'var(--slate-50)',
                            100: 'var(--slate-100)',
                            200: 'var(--slate-200)',
                            300: 'var(--slate-300)',
                            400: 'var(--slate-400)',
                            500: 'var(--slate-500)',
                            600: 'var(--slate-600)',
                            700: 'var(--slate-700)',
                            800: 'var(--slate-800)',
                            850: 'var(--slate-850)',
                            900: 'var(--slate-900)',
                            950: 'var(--slate-950)',
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css?v=1.0.3">
</head>
<body class="text-slate-200 antialiased h-screen flex items-center justify-center">

    <div x-data="loginForm()" class="glass-panel p-8 rounded-2xl shadow-2xl shadow-blue-900/20 w-full max-w-md border border-slate-700/50 relative overflow-hidden">
        
        <!-- Decoration -->
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-gradient-to-br from-blue-500/20 to-violet-500/20 blur-2xl"></div>
        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-32 h-32 rounded-full bg-gradient-to-tr from-blue-500/20 to-violet-500/20 blur-2xl"></div>

        <!-- Theme Toggle (Login Card Top Right) -->
        <button onclick="toggleTheme()" class="absolute top-4 right-4 z-20 text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-800/50 transition-colors" title="Cambiar tema">
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path>
            </svg>
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
        </button>

            <div class="inline-flex w-12 h-12 rounded-xl bg-slate-800/40 border border-slate-700/60 items-center justify-center shadow-md mb-4 text-blue-500 p-2">
                <svg class="w-full h-full" viewBox="0 0 478 549.31" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M473.75,134.22l-93.08-53.74-8.5,14.72,88.83,51.29v102.58h17v-107.48c0-3.04-1.62-5.84-4.25-7.36Z"/>

                    <path d="M239,531l-88.83-51.29-8.5,14.72,93.08,53.74c1.32.76,2.78,1.14,4.25,1.14s2.93-.38,4.25-1.14l93.08-53.74-8.5-14.72-88.83,51.29Z"/>
                    <path d="M17,300.25H0v107.48c0,3.04,1.62,5.84,4.25,7.36l93.08,53.74,8.5-14.72-88.83-51.29v-102.58Z"/>
                    <path d="M17,146.48l88.83-51.29-8.5-14.72L4.25,134.22c-2.63,1.52-4.25,4.32-4.25,7.36v107.48h17v-102.58Z"/>
                    <path d="M239,18.31l88.83,51.29,8.5-14.72L243.25,1.14c-2.63-1.52-5.87-1.52-8.5,0l-93.08,53.74,8.5,14.72,88.83-51.29Z"/>
                    <path d="M418.19,378.11c10.96-18.98,4.43-43.34-14.55-54.3-9.2-5.31-19.91-6.72-30.16-3.97-7.46,2-14.02,6.03-19.09,11.62l-49.72-28.71v-56.18l49.72-28.71c5.07,5.59,11.63,9.62,19.09,11.62,3.42.92,6.9,1.37,10.35,1.37,6.89,0,13.69-1.81,19.81-5.34,9.2-5.31,15.77-13.88,18.52-24.14,2.75-10.26,1.34-20.97-3.97-30.16-10.96-18.98-35.32-25.51-54.3-14.55-9.2,5.31-15.77,13.88-18.52,24.14-2,7.46-1.79,15.16.52,22.34l-49.72,28.71-48.66-28.09v-57.43c17.85-3.9,31.25-19.83,31.25-38.83,0-21.92-17.83-39.75-39.75-39.75s-39.75,17.83-39.75,39.75c0,19,13.4,34.92,31.25,38.83v57.43l-48.66,28.09-49.73-28.71c2.3-7.18,2.51-14.88.51-22.34-2.75-10.26-9.33-18.83-18.52-24.14s-19.91-6.72-30.16-3.97c-10.26,2.75-18.83,9.33-24.14,18.52s-6.72,19.91-3.97,30.16c2.75,10.26,9.33,18.83,18.52,24.14,6.12,3.54,12.92,5.34,19.81,5.34,3.45,0,6.93-.45,10.35-1.37,7.46-2,14.02-6.03,19.09-11.62l49.72,28.71v56.18l-49.72,28.71c-5.07-5.59-11.63-9.62-19.09-11.62-10.26-2.75-20.97-1.34-30.16,3.97-18.98,10.96-25.51,35.32-14.55,54.3,5.31,9.2,13.88,15.77,24.14,18.52,3.42.92,6.9,1.37,10.35,1.37,6.89,0,13.69-1.81,19.81-5.34,9.2-5.31,15.77-13.88,18.52-24.14,2-7.46,1.79-15.16-.51-22.34l49.72-28.71,48.66,28.09v57.43c-17.85,3.9-31.25,19.83-31.25,38.83,0,21.92,17.83,39.75,39.75,39.75s39.75-17.83,39.75-39.75c0-19-13.4-34.92-31.25-38.83v-57.43l48.66-28.09,49.72,28.71c-2.3,7.18-2.51,14.88-.52,22.34,2.75,10.26,9.33,18.83,18.52,24.14,6.25,3.61,13.07,5.32,19.81,5.32,13.75,0,27.14-7.13,34.49-19.87ZM372.39,171.37c3.57-2.06,7.48-3.04,11.34-3.04,7.87,0,15.53,4.08,19.74,11.37,3.04,5.26,3.85,11.39,2.27,17.26-1.57,5.87-5.34,10.78-10.6,13.81-5.26,3.04-11.39,3.84-17.26,2.27-5.87-1.57-10.78-5.34-13.81-10.6-6.27-10.86-2.54-24.81,8.33-31.08ZM216.25,107.5c0-12.55,10.21-22.75,22.75-22.75s22.75,10.21,22.75,22.75-10.21,22.75-22.75,22.75-22.75-10.21-22.75-22.75ZM100.12,213.05c-5.87,1.57-12,.77-17.26-2.27-5.26-3.04-9.03-7.94-10.6-13.81-1.57-5.87-.77-12,2.27-17.26,3.04-5.26,7.94-9.03,13.81-10.6,1.96-.52,3.95-.78,5.93-.78,3.94,0,7.83,1.03,11.34,3.06,5.26,3.04,9.03,7.94,10.6,13.81,1.57,5.87.77,12-2.27,17.26-3.04,5.26-7.94,9.03-13.81,10.6ZM116.21,364.12c-1.57,5.87-5.34,10.78-10.6,13.81-5.26,3.04-11.39,3.84-17.26,2.27-5.87-1.57-10.78-5.34-13.81-10.6-6.27-10.87-2.54-24.81,8.33-31.08,3.51-2.02,7.4-3.06,11.34-3.06,1.98,0,3.97.26,5.93.78,5.87,1.57,10.78,5.34,13.81,10.6,3.04,5.26,3.85,11.39,2.27,17.26ZM261.75,441.81c0,12.55-10.21,22.75-22.75,22.75s-22.75-10.21-22.75-22.75,10.21-22.75,22.75-22.75,22.75,10.21,22.75,22.75ZM287.66,302.75l-48.66,28.09-48.66-28.09v-56.18l48.66-28.09,48.66,28.09v56.18ZM364.06,346.86c3.04-5.26,7.94-9.03,13.81-10.6,5.87-1.57,12-.77,17.26,2.27,10.87,6.27,14.6,20.21,8.33,31.08-6.27,10.86-20.21,14.6-31.08,8.33-10.86-6.27-14.6-20.21-8.33-31.08Z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Bienvenido a <span class="font-logo text-blue-500">TaskCore</span></h1>
            <p class="text-sm text-slate-400 mt-1">Ingresa tus credenciales para continuar</p>
        </div>

        <form @submit.prevent="submitForm" class="relative z-10 space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Usuario</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                    </div>
                    <input x-model="email" type="text" required class="block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Ej: admin o ventas">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input x-model="password" type="password" required class="block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="••••••••">
                </div>
            </div>

            <div x-show="errorMessage" x-transition class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg p-3 flex items-center" style="display: none;">
                <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span x-text="errorMessage"></span>
            </div>

            <button type="submit" :disabled="isLoading" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-500 hover:to-violet-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-slate-900 transition-all disabled:opacity-50">
                <span x-show="!isLoading">Iniciar Sesión</span>
                <span x-show="isLoading" style="display: none;">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
            </button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function loginForm() {
            return {
                email: '',
                password: '',
                errorMessage: '',
                isLoading: false,
                
                async submitForm() {
                    this.isLoading = true;
                    this.errorMessage = '';
                    
                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.email,
                                password: this.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok) {
                            this.errorMessage = data.error || 'Ocurrió un error';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    } catch (error) {
                        this.errorMessage = 'No se pudo conectar con el servidor';
                    } finally {
                        this.isLoading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
