<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Pedido - Error</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/TaskCore_Isotipo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        blue: {
                            500: '#0278D2',
                            600: '#025fa6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b1329;
            background-image: radial-gradient(circle at 50% 50%, #101f42 0%, #0b1329 100%);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border border-red-500/20 relative overflow-hidden">
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-red-500/10 blur-2xl"></div>
        
        <div class="inline-flex w-16 h-16 rounded-full bg-red-500/10 items-center justify-center text-red-400 mb-6 border border-red-500/20">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <h1 class="text-xl font-bold text-white mb-2">Enlace no Válido</h1>
        <p class="text-sm text-slate-400 mb-6 leading-relaxed">{{ mensaje }}</p>
        
        <div class="text-xs text-slate-500">
            Si crees que esto es un error, por favor contacta al soporte técnico o a tu asesor de ventas asignado.
        </div>
    </div>

</body>
</html>
